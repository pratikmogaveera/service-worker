<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <title>Document</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      border: 0;
      font-size: 100%;
      font: inherit;
      vertical-align: baseline;
    }

    body {
      line-height: 1;
    }

    html {
      background-color: #101010;
      color: #eaeaea;
      font-family: Helvetica, Arial, sans-serif;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #353535;
      padding: 16px;
    }

    header h1 {
      font-size: 24px;
    }

    .status {
      color: rgb(215, 76, 2)
    }

    main {
      padding: 16px;
    }

</head>

<body>
  <header>
    <h1>Service Worker</h1>
    <h2 class="status">Offline</h2>
  </header>
  <main>
    <p>This is the body of the page.</p>

</html>
